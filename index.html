<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Social Media Image Creator</title>
    
<link rel="stylesheet" href="style.css" /></head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="toast" id="toast"></div>



    <header class="header">
        <div class="header-buttons">
            <button class="import-btn" onclick="document.getElementById('importAll').click()">
                📁 Import
            </button>
            <input type="file" id="importAll" multiple="" accept="image/*" onchange="handleImportAll(event)" style="display: none;" />
            
            <select id="platformSelect" class="header-select" onchange="const args = this.value.split(','); setPlatform(args[0], parseInt(args[1]), parseInt(args[2])); adjustSelectWidth(this);">
                <option value="Facebook,1200,630">Facebook</option>
                <option value="WhatsApp,1080,1080">WhatsApp</option>
                <option value="Twitter,1200,675">Twitter</option>
                <option value="Instagram,1080,1080">Instagram</option>
                <option value="Story,1080,1920">Story</option>
            </select>

            <select id="formatSelect" class="header-select" onchange="setFormat(this.value); adjustSelectWidth(this);">
                <option value="png">PNG</option>
                <option value="jpg">JPG</option>
                <option value="webp">WebP</option>
            </select>

            <button class="save-btn" onclick="saveImage()">
                💾 Save
            </button>
            
            <button id="themeToggleBtn" class="header-select" onclick="toggleTheme()" style="background: var(--secondary-bg); display: flex; align-items: center; gap: 0.5rem; justify-content: center; margin-left: auto;">
                <span id="themeIcon">🌙</span> <span>Night</span>
            </button>
        </div>
    </header>

    <div class="container">
        <!-- Canvas Area -->
        <div class="canvas-container">
            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="mainCanvas" width="1200" height="630"></canvas>
            </div>
        </div>

        <!-- Right Sidebar - Controls -->
        <aside class="sidebar-right active">
            <div class="drag-handle-container" id="dragHandle">
                <div class="drag-handle"></div>
            </div>
            <!-- Background Section -->
            <div class="control-section active" id="tab-bg">
                <h3 class="section-title">Background</h3>
                
                <div style="display: flex; gap: 1rem; align-items: stretch; justify-content: space-between;">
                    <div class="control-group" style="margin-bottom: 0; display: flex; flex-direction: column; align-items: center; gap: 0.25rem;">
                        <label class="control-label" style="margin-bottom: 0; font-size: 0.75rem;">Color 1</label>
                        <input type="color" id="gradientColor1" value="#667eea" onchange="updateBackground()" style="width: 36px; height: 36px; padding: 0; border: none; border-radius: 4px; cursor: pointer;" />
                    </div>

                    <div class="control-group" style="margin-bottom: 0; display: flex; flex-direction: column; align-items: center; gap: 0.25rem;">
                        <label class="control-label" style="margin-bottom: 0; font-size: 0.75rem;">Color 2</label>
                        <input type="color" id="gradientColor2" value="#764ba2" onchange="updateBackground()" style="width: 36px; height: 36px; padding: 0; border: none; border-radius: 4px; cursor: pointer;" />
                    </div>

                    <div class="control-group" style="margin-bottom: 0; flex: 1;">
                        <label class="file-label" onclick="document.getElementById('bgImage').click()" style="padding: 0.5rem; display: flex; align-items: center; justify-content: center; height: 100%; font-size: 0.85rem; margin: 0;">
                            📤 Upload BG
                        </label>
                        <input type="file" id="bgImage" accept="image/*" onchange="handleBgImage(event)" style="display: none;" />
                    </div>
                </div>
            </div>

            <!-- Image Adjustments -->
            <div class="control-section" id="tab-adjust">
                <h3 class="section-title">Image Adjustments</h3>
                
                <div class="control-group">
                    <label class="control-label">
                        Size <span class="range-value" id="sizeValue">100%</span>
                    </label>
                    <input type="range" id="imgSize" min="0" max="200" value="100" oninput="updateImageAdjustments()" />
                </div>

                <div class="template-grid" id="adjustOptionButtons" style="margin-bottom: 1.5rem; grid-template-columns: repeat(3, 1fr); gap: 0.5rem;">
                    <button class="template-btn active" data-adjust="contrast" style="font-size: 0.75rem; padding: 0.5rem; min-height: unset;">Contrast</button>
                    <button class="template-btn" data-adjust="brightness" style="font-size: 0.75rem; padding: 0.5rem; min-height: unset;">Brightness</button>
                    <button class="template-btn" data-adjust="darkness" style="font-size: 0.75rem; padding: 0.5rem; min-height: unset;">Darkness</button>
                    <button class="template-btn" data-adjust="blur" style="font-size: 0.75rem; padding: 0.5rem; min-height: unset;">Blur</button>
                    <button class="template-btn" data-adjust="opacity" style="font-size: 0.75rem; padding: 0.5rem; min-height: unset;">Opacity</button>
                    <button class="template-btn" data-adjust="sepia" style="font-size: 0.75rem; padding: 0.5rem; min-height: unset;">Sepia</button>
                    <button class="template-btn" data-adjust="warmth" style="font-size: 0.75rem; padding: 0.5rem; min-height: unset;">Warmth</button>
                    <button class="template-btn" data-adjust="tint" style="font-size: 0.75rem; padding: 0.5rem; min-height: unset;">Tint</button>
                    <button class="template-btn" data-adjust="hue" style="font-size: 0.75rem; padding: 0.5rem; min-height: unset;">Hue Rotate</button>
                </div>

                <div class="control-group" id="masterSliderGroup">
                    <label class="control-label">
                        <span id="masterAdjustLabel">Contrast</span> <span class="range-value" id="masterAdjustValue">100%</span>
                    </label>
                    <input type="range" id="masterAdjustSlider" min="0" max="200" value="100" />
                </div>

                <div style="display: none;">
                    <input type="range" id="contrast" min="0" max="200" value="100" />
                    <input type="range" id="brightness" min="0" max="200" value="100" />
                    <input type="range" id="darkness" min="0" max="100" value="0" />
                    <input type="range" id="blur" min="0" max="20" value="0" />
                    <input type="range" id="opacity" min="0" max="100" value="100" />
                    <input type="range" id="sepia" min="0" max="100" value="0" />
                    <input type="range" id="warmth" min="-100" max="100" value="0" />
                    <input type="range" id="tint" min="-100" max="100" value="0" />
                    <input type="range" id="hue" min="0" max="360" value="0" />
                </div>
            </div>

            <!-- Text Effect Templates -->
            <div class="control-section" id="tab-effects">
                <h3 class="section-title">Text Effect Templates</h3>
                <div class="template-grid">
                    <button class="template-btn neon" onclick="applyTextTemplate('neon')">✨ Neon Glow</button>
                    <button class="template-btn gold" onclick="applyTextTemplate('gold')">🏆 Gold</button>
                    <button class="template-btn outline" onclick="applyTextTemplate('outline')">⭕ Outline</button>
                    <button class="template-btn shadow" onclick="applyTextTemplate('shadow')">🌑 3D Shadow</button>
                    <button class="template-btn gradient" onclick="applyTextTemplate('gradient')">🌈 Gradient</button>
                    <button class="template-btn" onclick="applyTextTemplate('retro')" style="background: #ff6b6b; color: white;">📼 Retro</button>
                    <button class="template-btn" onclick="applyTextTemplate('cyber')" style="background: #00d9ff; color: #000;">🤖 Cyber</button>
                    <button class="template-btn" onclick="applyTextTemplate('elegant')" style="background: linear-gradient(135deg, #667eea, #764ba2);">💎 Elegant</button>
                </div>
            </div>

            <!-- Text Tools -->
            <div class="control-section" id="tab-text" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; align-items: end;">
                <h3 class="section-title" style="grid-column: 1 / -1; margin-bottom: 0;">Text Tools</h3>
                
                <div class="control-group" style="grid-column: 1 / -1; margin-bottom: 0;">
                    <label class="control-label">Text Content</label>
                    <textarea id="textContent" placeholder="Enter your text here..." oninput="updateText()" style="min-height: 60px;"></textarea>
                </div>

                <div class="control-group" style="grid-column: span 2; margin-bottom: 0;">
                    <label class="control-label">Font Family</label>
                    <select id="fontFamily" onchange="updateText()" style="width: 100%; padding: 0.5rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--secondary-bg); color: var(--text-primary);">
                        <option value="Arial">Arial</option>
                        <option value="Helvetica">Helvetica</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Verdana">Verdana</option>
                        <option value="Courier New">Courier New</option>
                        <option value="Impact">Impact</option>
                        <option value="Comic Sans MS">Comic Sans MS</option>
                    </select>
                </div>

                <div class="control-group" style="margin-bottom: 0; display: flex; flex-direction: column; width: 100%;">
                    <label class="control-label">Text Color</label>
                    <input type="color" id="textColor" value="#ffffff" onchange="updateText()" style="width: 100%; height: 36px; padding: 0; border: none; border-radius: 4px; cursor: pointer;" />
                </div>

                <div class="control-group" style="grid-column: 1 / -1; margin-bottom: 0;">
                    <label class="control-label">
                        Text Size <span class="range-value" id="textSizeValue">48px</span>
                    </label>
                    <input type="range" id="textSize" min="12" max="120" value="48" oninput="updateText()" />
                </div>

                <div class="control-group" style="grid-column: 1 / -1; margin-bottom: 0;">
                    <label class="control-label">Styling</label>
                    <div class="text-controls" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem;">
                        <button class="text-btn" id="boldBtn" onclick="toggleTextStyle('bold')">B</button>
                        <button class="text-btn" id="italicBtn" onclick="toggleTextStyle('italic')">I</button>
                        <button class="text-btn" id="underlineBtn" onclick="toggleTextStyle('underline')">U</button>
                    </div>
                </div>

                <div class="control-group" style="grid-column: 1 / -1; margin-bottom: 0;">
                    <label class="control-label">Alignment</label>
                    <div class="align-controls" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem;">
                        <button class="align-btn active" id="alignLeft" onclick="setTextAlign('left')">⬅ Left</button>
                        <button class="align-btn" id="alignCenter" onclick="setTextAlign('center')">⬆ Center</button>
                        <button class="align-btn" id="alignRight" onclick="setTextAlign('right')">➡ Right</button>
                    </div>
                </div>

                <div class="control-group" style="margin-bottom: 0; align-self: center;">
                    <div class="toggle-switch">
                        <span class="control-label" style="margin: 0; font-size: 0.85rem;">Text BG</span>
                        <div class="toggle" id="textBgToggle" onclick="toggleTextBackground()">
                            <div class="toggle-slider"></div>
                        </div>
                    </div>
                </div>

                <div class="control-group" id="textBgColorGroup" style="display: none; margin-bottom: 0; width: 100%;">
                    <label class="control-label" style="font-size: 0.85rem;">BG Color</label>
                    <input type="color" id="textBgColor" value="#000000" onchange="updateText()" style="width: 100%; height: 36px; padding: 0; border: none; border-radius: 4px; cursor: pointer;" />
                </div>

                <div class="control-group" style="margin-bottom: 0; display: flex; flex-direction: column; width: 100%;">
                    <label class="control-label" style="font-size: 0.85rem;">Shadow</label>
                    <input type="color" id="shadowColor" value="#000000" onchange="updateText()" style="width: 100%; height: 36px; padding: 0; border: none; border-radius: 4px; cursor: pointer;" />
                </div>

                <div class="control-group" style="grid-column: 1 / -1; margin-bottom: 0;">
                    <label class="control-label">
                        Shadow Blur <span class="range-value" id="shadowBlurValue">0px</span>
                    </label>
                    <input type="range" id="shadowBlur" min="0" max="50" value="0" oninput="updateText()" />
                </div>
            </div>

            <!-- Settings -->
            <div class="control-section" id="tab-settings">
                <h3 class="section-title">Settings</h3>
                <div class="control-group">
                    <label class="control-label">Mobile Sidebar Position</label>
                    <select id="sidebarPosition" onchange="toggleSidebarPosition(this.value)" style="width: 100%; padding: 0.5rem; background: var(--primary-bg); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 6px;">
                        <option value="bottom">Bottom Sheet</option>
                        <option value="right">Right Side</option>
                    </select>
                </div>
            </div>
        </aside>
    </div>

    <!-- Bottom Navigation for Mobile -->
    <nav class="bottom-nav">
        <button class="nav-tab active" data-tab="tab-bg">
            <span style="font-size: 1.25rem;">🖼️</span>
            <span>BG</span>
        </button>
        <button class="nav-tab" data-tab="tab-adjust">
            <span style="font-size: 1.25rem;">🎛️</span>
            <span>Adjust</span>
        </button>
        <button class="nav-tab" data-tab="tab-effects">
            <span style="font-size: 1.25rem;">✨</span>
            <span>Effects</span>
        </button>
        <button class="nav-tab" data-tab="tab-text">
            <span style="font-size: 1.25rem;">📝</span>
            <span>Text</span>
        </button>
        <button class="nav-tab" data-tab="tab-settings">
            <span style="font-size: 1.25rem;">⚙️</span>
            <span>Settings</span>
        </button>
    </nav>

    

<script src="script.js"></script></body></html>
