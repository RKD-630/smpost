<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialPost Studio - Pro</title>
  
  
<link rel="stylesheet" href="style.css" /></head>
<body>

  <header>
    <select id="size-preset">
      <option value="custom">Custom Size</option>
      <option value="1200x630" selected="">Facebook Post (1200×630)</option>
      <option value="1080x1920">WhatsApp Status (1080×1920)</option>
      <option value="1200x675">Twitter/X Post (1200×675)</option>
      <option value="1080x1080">Instagram Square (1080×1080)</option>
      <option value="1200x627">LinkedIn Post (1200×627)</option>
    </select>
    <input type="number" id="custom-w" value="1200" style="width:70px;" /> × 
    <input type="number" id="custom-h" value="630" style="width:70px;" />
    <button class="btn" onclick="applySize()">Apply Size</button>
    <div style="flex:1"></div>
    <button class="btn" onclick="document.getElementById('file-input').click()">📁 Import All Images</button>
    <button class="btn" onclick="document.getElementById('bg-file-input').click()">🖼️ Upload BG Image</button>
    <button class="btn primary" onclick="exportCanvas()">💾 Export PNG</button>
    <input type="file" id="file-input" multiple="" accept="image/*" />
    <input type="file" id="bg-file-input" accept="image/*" />
  </header>

  <main>
    <aside id="controls">
      <!-- Background Controls -->
      <div class="panel active" id="bg-panel">
        <h3>Background Gradient</h3>
        <div class="control-row"><label>Start</label><input type="color" id="grad-start" value="#3b82f6" /><label>End</label><input type="color" id="grad-end" value="#8b5cf6" /></div>
        <div class="control-row"><label>Angle</label><input type="range" id="grad-angle" min="0" max="360" value="135" /></div>
        <div class="control-row"><label>Type</label><select id="grad-type"><option value="linear">Linear</option><option value="radial">Radial</option></select></div>
      </div>

      <!-- Image Adjust Controls -->
      <div class="panel" id="img-panel">
        <h3>Image Adjustments</h3>
        <div class="control-row"><label>Brightness</label><input type="range" data-prop="brightness" min="0" max="200" value="100" /></div>
        <div class="control-row"><label>Contrast</label><input type="range" data-prop="contrast" min="0" max="200" value="100" /></div>
        <div class="control-row"><label>Darkness</label><input type="range" data-prop="darkness" min="0" max="100" value="0" /></div>
        <div class="control-row"><label>Blur</label><input type="range" data-prop="blur" min="0" max="20" value="0" /></div>
        <div class="control-row"><label>Opacity</label><input type="range" data-prop="opacity" min="0" max="100" value="100" /></div>
        <div class="control-row"><label>Sepia</label><input type="range" data-prop="sepia" min="0" max="100" value="0" /></div>
        <div class="control-row"><label>Warmth</label><input type="range" data-prop="warmth" min="0" max="100" value="0" /></div>
        <div class="control-row"><label>Tint</label><input type="range" data-prop="tint" min="-180" max="180" value="0" /></div>
        <div class="control-row"><label>Hue</label><input type="range" data-prop="hue" min="0" max="360" value="0" /></div>
        <button class="btn btn-sm danger" onclick="resetImgAdj()">Reset All</button>

        <h3 style="margin-top:12px;">Size &amp; Transform</h3>
        <div class="btn-group">
          <button class="btn btn-sm" onclick="resizeImg(-10)">➖ Smaller</button>
          <button class="btn btn-sm" onclick="resizeImg(10)">➕ Larger</button>
        </div>
        <div class="control-row" style="margin-top:8px;"><label>Scale %</label><input type="range" id="img-scale" min="10" max="300" value="100" /></div>
        <button class="btn primary btn-sm" style="width:100%; margin-top:8px;" onclick="openCrop()">✂️ Crop Image</button>
      </div>

      <!-- Text Controls -->
      <div class="panel" id="text-panel">
        <h3>Text Styling</h3>
        <div class="control-row"><label>Font</label><select id="txt-font"><option value="Inter, sans-serif">Inter</option><option value="Georgia, serif">Georgia</option><option value="Courier New, monospace">Courier New</option><option value="Impact, sans-serif">Impact</option><option value="Comic Sans MS, cursive">Comic Sans</option></select></div>
        <div class="control-row"><label>Size</label><input type="range" id="txt-size" min="12" max="120" value="32" /></div>
        <div class="control-row"><label>Color 1</label><input type="color" id="txt-color1" value="#ffffff" /><label>Color 2</label><input type="color" id="txt-color2" value="#000000" /></div>
        <label class="toggle"><input type="checkbox" id="txt-grad" /> Gradient Text Fill</label>
        <div class="control-row"><label>Text BG</label><input type="color" id="txt-bg" value="#000000" /><label>Opacity</label><input type="range" id="txt-bg-opacity" min="0" max="100" value="0" /></div>
        
        <div class="btn-group">
          <button class="btn btn-sm" onclick="toggleCmd('bold')">B</button>
          <button class="btn btn-sm" onclick="toggleCmd('italic')"><i>I</i></button>
          <button class="btn btn-sm" onclick="toggleCmd('underline')"><u>U</u></button>
        </div>
        <div class="btn-group" style="margin-top:6px;">
          <button class="btn btn-sm" onclick="alignText('left')">Left</button>
          <button class="btn btn-sm" onclick="alignText('center')">Center</button>
          <button class="btn btn-sm" onclick="alignText('right')">Right</button>
        </div>

        <h3 style="margin-top:12px;">Shadow &amp; Glow</h3>
        <label class="toggle"><input type="checkbox" id="txt-shadow-on" /> Text Shadow</label>
        <div class="control-row"><label>X</label><input type="range" id="txt-shadow-x" min="-20" max="20" value="2" /><label>Y</label><input type="range" id="txt-shadow-y" min="-20" max="20" value="2" /></div>
        <div class="control-row"><label>Blur</label><input type="range" id="txt-shadow-blur" min="0" max="50" value="5" /><input type="color" id="txt-shadow-color" value="#000000" /></div>

        <label class="toggle" style="margin-top:6px;"><input type="checkbox" id="txt-glow-out-on" /> Outer Glow</label>
        <div class="control-row"><label>Blur</label><input type="range" id="txt-glow-out-blur" min="0" max="30" value="8" /><input type="color" id="txt-glow-out-color" value="#3b82f6" /></div>

        <label class="toggle" style="margin-top:6px;"><input type="checkbox" id="txt-glow-in-on" /> Inner Glow</label>
        <div class="control-row"><label>Blur</label><input type="range" id="txt-glow-in-blur" min="1" max="20" value="4" /><input type="color" id="txt-glow-in-color" value="#ffffff" /></div>
      </div>

      <button class="btn primary" id="add-text-btn" style="width:100%; margin-top:auto;">+ Add Text</button>
      <button class="btn danger" id="delete-btn" style="width:100%; display:none;" onclick="deleteSelected()">🗑️ Delete Selected</button>
    </aside>

    <div class="canvas-wrapper" onclick="deselectAll(event)">
      <div id="canvas" style="width: 600px; height: 315px;"></div>
    </div>
  </main>

  <!-- Crop Modal -->
  <div id="crop-modal">
    <div id="crop-container">
      <img id="crop-img" src="" alt="Crop Source" />
      <div id="crop-selection"></div>
    </div>
    <div class="crop-actions">
      <button class="btn" onclick="closeCrop()">Cancel</button>
      <button class="btn primary" onclick="applyCrop()">✅ Apply Crop</button>
    </div>
  </div>

  

<script src="script.js"></script></body></html>
