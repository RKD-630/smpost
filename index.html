<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Media Image Editor</title>
    
<link rel="stylesheet" href="style.css" /></head>
<body>
    <div class="container">
        <div class="header">
            <div class="social-icons">
                <span>📘</span>
                <span>💬</span>
                <span>🐦</span>
                <span>📷</span>
            </div>
            <h1>Social Media Image Editor</h1>
            <button class="btn btn-primary" onclick="exportImage()">⬇ Export / Download</button>
        </div>

        <div class="main-content">
            <!-- Left Sidebar -->
            <div class="sidebar">
                <button class="btn btn-primary" style="width: 100%; margin-bottom: 20px;" onclick="document.getElementById('importAll').click()">
                    📁 Import All Images
                </button>
                <input type="file" id="importAll" multiple="" accept="image/*" onchange="importImages(event)" />

                <div class="panel-title">Background Settings</div>
                
                <div class="control-group">
                    <label class="control-label">Gradient Background</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="bgColor1" value="#667eea" onchange="updateBackground()" />
                        <input type="color" id="bgColor2" value="#764ba2" onchange="updateBackground()" />
                    </div>
                    <div class="gradient-toggle">
                        <span>Gradient</span>
                        <div class="toggle-switch active" id="gradientToggle" onclick="toggleGradient()"></div>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Custom Background Image</label>
                    <label class="file-label" for="bgImageUpload">
                        ⬆ Upload Background
                    </label>
                    <input type="file" id="bgImageUpload" accept="image/*" onchange="uploadBackground(event)" />
                </div>
            </div>

            <!-- Canvas Area -->
            <div class="canvas-container">
                <canvas id="editorCanvas" width="800" height="600"></canvas>
                
                <div class="text-toolbar">
                    <select id="fontFamily" onchange="updateText()">
                        <option value="Arial">Arial</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Courier New">Courier New</option>
                        <option value="Verdana">Verdana</option>
                    </select>
                    
                    <input type="color" id="textColor" value="#ffffff" onchange="updateText()" />
                    
                    <button onclick="toggleTextStyle('bold')" id="btnBold"><b>B</b></button>
                    <button onclick="toggleTextStyle('italic')" id="btnItalic"><i>I</i></button>
                    <button onclick="toggleTextStyle('underline')" id="btnUnderline"><u>U</u></button>
                    
                    <button onclick="alignText('left')" id="alignLeft">⬅ Left</button>
                    <button onclick="alignText('center')" id="alignCenter">⬌ Center</button>
                    <button onclick="alignText('right')" id="alignRight">Right ➡</button>
                    
                    <input type="text" id="textInput" placeholder="Enter text..." oninput="updateText()" style="min-width: 150px;" />
                </div>
            </div>

            <!-- Right Sidebar -->
            <div class="sidebar sidebar-right">
                <div class="panel-title">Image Adjustments</div>

                <div class="control-group">
                    <label class="control-label">Contrast</label>
                    <input type="range" id="contrast" min="0" max="200" value="100" oninput="updateFilters()" />
                    <div class="value-display" id="contrastValue">100%</div>
                </div>

                <div class="control-group">
                    <label class="control-label">Brightness</label>
                    <input type="range" id="brightness" min="0" max="200" value="100" oninput="updateFilters()" />
                    <div class="value-display" id="brightnessValue">100%</div>
                </div>

                <div class="control-group">
                    <label class="control-label">Blur</label>
                    <input type="range" id="blur" min="0" max="20" value="0" step="0.5" oninput="updateFilters()" />
                    <div class="value-display" id="blurValue">0px</div>
                </div>

                <div class="control-group">
                    <label class="control-label">Opacity</label>
                    <input type="range" id="opacity" min="0" max="100" value="100" oninput="updateFilters()" />
                    <div class="value-display" id="opacityValue">100%</div>
                </div>

                <div class="control-group">
                    <label class="control-label">Sepia</label>
                    <input type="range" id="sepia" min="0" max="100" value="0" oninput="updateFilters()" />
                    <div class="value-display" id="sepiaValue">0%</div>
                </div>

                <div class="control-group">
                    <label class="control-label">Warmth</label>
                    <input type="range" id="warmth" min="0" max="100" value="0" oninput="updateFilters()" />
                    <div class="value-display" id="warmthValue">0%</div>
                </div>

                <div class="control-group">
                    <label class="control-label">Tint</label>
                    <input type="range" id="tint" min="0" max="100" value="0" oninput="updateFilters()" />
                    <div class="value-display" id="tintValue">0%</div>
                </div>

                <div class="control-group">
                    <label class="control-label">Hue Rotate</label>
                    <input type="range" id="hue" min="0" max="360" value="0" oninput="updateFilters()" />
                    <div class="value-display" id="hueValue">0°</div>
                </div>
            </div>
        </div>
    </div>

    

<script src="script.js"></script></body></html>
